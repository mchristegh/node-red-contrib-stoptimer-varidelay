<script type="text/javascript">
    RED.nodes.registerType('stoptimer-varidelay-plus',{
        category: 'function',
        color:"#869869",
        defaults: {
            duration: {value:"5",required:true,validate:RED.validators.typedInput("durationType")},
            durationType: {value:'num'},
            units: {value:"Second"},
            payloadtype: {value:'num'},
            payloadval: {value:"0"},
            name: {value:""},
            reporting: {value:"none"},
            reportingformat: {value:"human"},
            persist: {value:false},
            ignoretimerpass: {value:false},
            donotresettimer: {value:false},
            thresholdaction: {value:"donothing"},
            thresholdcount: {value:"0"},
            thresholdaddtime: {value:"0"},
            thresholdaddtimeunits: {value:"Second"},
            heartbeatinterval: {value:"0"},
            heartbeatintervalunits: {value:"Second"}
        },
        inputs:1,
        outputs:5,
        icon: "stoptimer.png",
        label: function() {
            return this.name || this.duration + " " + this.units + " Timer";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        outputLabels: ["Original Payload","Additional Payload","Time Remaining","Ignored Message","Event"],
        oneditprepare: function() {
            $("#node-input-payloadval").typedInput({
                default: 'num',
                typeField: $("#node-input-payloadtype"),
                types:['str','num','bool']
            });

            if (this.durationType == null) {
                this.durationType = "num";
            }

            $("#node-input-durationType").val(this.durationType);

            $("#node-input-duration").typedInput({
                default: 'num',
                typeField: $("#node-input-durationType"),
                types:['num','env']
            });

            $("#node-input-duration").typedInput('type', this.durationType);

            $("#node-input-reporting").val(this.reporting);
            $("#node-input-reportingformat").val(this.reportingformat);
            $("#node-input-thresholdaction").val(this.thresholdaction);
            $("#node-input-thresholdaddtimeunits").val(this.thresholdaddtimeunits);
            $("#node-input-heartbeatintervalunits").val(this.heartbeatintervalunits);

            function updateThresholdVisibility() {
                let action = $("#node-input-thresholdaction").val();
                if (action === "donothing") {
                    $("#threshold-count-row").hide();
                    $("#threshold-addtime-row").hide();
                    $("#threshold-addtimeunits-row").hide();
                } else if (action === "addtime") {
                    $("#threshold-count-row").show();
                    $("#threshold-addtime-row").show();
                    $("#threshold-addtimeunits-row").show();
                } else {
                    $("#threshold-count-row").show();
                    $("#threshold-addtime-row").hide();
                    $("#threshold-addtimeunits-row").hide();
                }
            }

            $("#node-input-thresholdaction").on("change", updateThresholdVisibility);
            updateThresholdVisibility();
        }
    });
</script>

<script type="text/x-red" data-help-name="stoptimer-varidelay-plus">
    <p><B>General usage</B><br>
       Sends the <code>msg</code> through the first output after the set timer duration. If a new <code>msg</code> is received before the timer has ended, it will replace the existing <code>msg</code> and the timer will be restarted, unless the new <code>msg</code> has a <code>payload</code> of a recognized control command. All control commands are <b>case insensitive</b>. The second output allows you to send an additional payload of a number, string or boolean. If the timer is stopped, the second and third outputs will automatically send a payload of <code>stopped</code>. The third output will send the time remaining as time ticks away.
    <br><br>The status below the node as well as the third output can be configured via the <I>Reporting</I> field in the node to update at a frequency of:
        <ul>
          <li>Never (default)</li>
          <li>Every Second</li>
          <li>Every Minute, Last minute by seconds</li>
        </ul>
        The last option works as follows:
        <ul>
          <li>While there is more than 1 minute remaining, the timer will decrement every minute. At the 1 minute point, it will switch to reporting every second.</li>
          <li>The exception to this rule is if your duration is not a minute increment. In that case, the first update will be for the partial minute, after which it will operate as noted above. (for example: 2.5 minutes will decrement to 2 minutes, then 1 minute, then every second down to zero)</li>
        </ul>
    </p>
    <p>
      The format of the reporting (and status) are defined by the "Reporting Format" option. The default is hh:mm:ss (string), but it can be configured to present that as the total number of seconds, minutes or hours (number) instead.
    </p>
    <p><B>Control Commands</B><br>
      All control commands are case insensitive. The following commands are supported:
      <ul>
        <li><code>stop</code> — cancels the timer immediately</li>
        <li><code>pause</code> — freezes the countdown at the current remaining time</li>
        <li><code>resume</code> — restarts the countdown from the frozen point</li>
        <li><code>query</code> — returns a full state snapshot on output 5 without affecting the timer</li>
        <li><code>lock</code> — enables Do Not Reset Timer at runtime</li>
        <li><code>unlock</code> — disables Do Not Reset Timer at runtime</li>
        <li><code>disable</code> — prevents new timer starts. Everything else works normally. The current timer run continues if running.</li>
        <li><code>enable</code> — re-enables new timer starts</li>
        <li><code>adjusttime</code> — adds or subtracts time from the current remaining time (running or paused only). Requires <code>msg.adjusttime</code> in milliseconds. Optionally set <code>msg.adjusttimeunits</code> to override units.</li>
        <li><code>settime</code> — sets the current remaining time to an exact value (running or paused only). Requires <code>msg.settime</code> in milliseconds. Optionally set <code>msg.settimeunits</code>. Must be positive.</li>
        <li><code>setduration</code> — sets the timer duration for all future runs. Requires <code>msg.setduration</code> in milliseconds. Optionally set <code>msg.setdurationunits</code>. Must be positive. Works in all states.</li>
      </ul>
    </p>
    <p><B>Heartbeat</B><br>
      Optionally configure a <i>Heartbeat Interval</i> to send a periodic "still alive" signal on output 5 while a timer run is active. This is useful for external monitoring or watchdog systems that need to confirm the node is functioning correctly over long running timers.
      <ul>
        <li>Set to <code>0</code> (default) to disable</li>
        <li>The heartbeat starts the moment the timer starts and fires on a fixed schedule</li>
        <li>The heartbeat fires whether the timer is running <b>or</b> paused</li>
        <li>The heartbeat schedule is <b>not</b> affected by pause, resume, adjusttime, settime, or threshold actions — it ticks independently on its own fixed interval once started</li>
        <li>The heartbeat stops when the timer is stopped or expires</li>
        <li><code>disable</code> does not affect an in-progress run's heartbeat — it continues until the run stops or expires naturally</li>
        <li>After a persisted restart, the heartbeat restarts fresh from that point rather than resuming the original schedule</li>
      </ul>
      Each heartbeat message on output 5 has <code>msg.timerEvent = "heartbeat"</code> along with the full standard state snapshot, so you can see <code>timerState</code>, <code>remainingTime</code>, <code>disabled</code>, and <code>doNotResetTimer</code> at the moment of each heartbeat.
    </p>
    <p><B>Message properties on all outputs</B><br>
      All output messages include the following additional properties:
      <ul>
        <li><code>msg.timerState</code> — the current state of the timer: <code>running</code>, <code>paused</code>, <code>stopped</code>, or <code>expired</code></li>
        <li><code>msg.timerDuration</code> — the original timer duration in milliseconds (outputs 1, 2, and 3)</li>
        <li><code>msg.elapsedTime</code> — the time elapsed since the timer started in milliseconds (outputs 1, 2, and 3)</li>
        <li><code>msg.remainingTime</code> — the remaining time in milliseconds (outputs 3 and 4)</li>
        <li><code>msg.ignoredCount</code> — the number of messages ignored during the current timer run (outputs 4 and 5)</li>
        <li><code>msg.lastIgnoredTime</code> — ISO 8601 timestamp of the last ignored message, or <code>null</code> if none (outputs 4 and 5)</li>
        <li><code>msg.doNotResetTimer</code> — current runtime lock state as a boolean (output 5)</li>
        <li><code>msg.disabled</code> — current disabled state as a boolean (output 5)</li>
      </ul>
    </p>
    <p><B>Output 5 — Event</B><br>
      Output 5 fires for every timer lifecycle event. The <code>msg.timerEvent</code> property identifies what triggered it:
      <ul>
        <li><code>started</code> — timer started or restarted</li>
        <li><code>paused</code> — timer was paused</li>
        <li><code>resumed</code> — timer was resumed</li>
        <li><code>stopped</code> — timer was stopped (from any source including threshold actions)</li>
        <li><code>expired</code> — timer expired naturally</li>
        <li><code>query</code> — response to a query message</li>
        <li><code>locked</code> — donotresettimer enabled at runtime</li>
        <li><code>unlocked</code> — donotresettimer disabled at runtime</li>
        <li><code>disabled</code> — node disabled, new starts prevented</li>
        <li><code>enabled</code> — node enabled, new starts allowed</li>
        <li><code>heartbeat</code> — periodic liveness signal, see Heartbeat section above</li>
        <li><code>timeadjusted</code> — remaining time adjusted. <code>msg.timeAdjusted</code> contains the adjustment in milliseconds.</li>
        <li><code>timeset</code> — remaining time set to exact value. <code>msg.timeSet</code> contains the new remaining time in milliseconds.</li>
        <li><code>durationset</code> — future duration set. <code>msg.durationSet</code> contains the new duration in milliseconds.</li>
        <li><code>threshold_stopped</code> — threshold action stopped the timer</li>
        <li><code>threshold_paused</code> — threshold action paused the timer</li>
        <li><code>threshold_reset</code> — threshold action reset the timer</li>
        <li><code>threshold_time_added</code> — threshold action added time. <code>msg.timeAdded</code> contains the amount added in milliseconds.</li>
        <li><code>threshold_warning</code> — warning threshold hit, no action taken on timer</li>
      </ul>
    </p>
    <p><B>Querying the timer</B><br>
      Send a message with <code>msg.payload</code> of <code>query</code> (any case) to get a full snapshot of the current timer state on output 5. The timer is not affected in any way by a query message.
    </p>
    <p><B>Overriding the node via incoming messages</B><br>
      If the input contains <code>msg.delay</code>, then the delay will be <code>msg.delay</code> units of time, where the units are whatever the units are defaulted to in the node itself. In the absence of a <code>msg.delay</code>, or a value in <code>msg.delay</code> that cannot be converted to an int, the value configured within the node will be used. If the value of <code>msg.delay</code> is less than 0, then 0 is used.
    </p>
    <p>
      If the input contains <code>msg.units</code>, with a value of "milliseconds", "seconds", "minutes" or "hours" then that will override what is defaulted in the node. Both singular and plural forms are accepted and the value is case insensitive. In the absence of a <code>msg.units</code>, or an unknown string in <code>msg.units</code>, the units configured within the node will be used. In the case of an unknown string, a warning message will appear in the Debug logs.
    </p>
    <p><b>Pausing and Resuming</b><br>
      The timer can be paused by sending a message with <code>msg.payload</code> of <code>pause</code> (any case). While paused:
      <ul>
        <li>The countdown is frozen at the remaining time</li>
        <li>The node status shows <code>Paused: HH:MM:SS</code> with a yellow indicator</li>
        <li>Outputs 2 and 3 will send a payload of <code>paused</code></li>
        <li>Output 5 sends <code>msg.timerEvent = "paused"</code></li>
        <li>Any incoming message other than recognized control commands will be routed to output 4</li>
        <li>Sending another <code>pause</code> message while already paused will also be routed to output 4</li>
        <li>Sending a <code>pause</code> message when the timer is not running will be ignored and the current status restored</li>
      </ul>
      The timer can be resumed by sending a message with <code>msg.payload</code> of <code>resume</code> (any case). On resume:
      <ul>
        <li>The countdown restarts from where it was frozen</li>
        <li>Outputs 2 and 3 will send a payload of <code>resumed</code></li>
        <li>Output 5 sends <code>msg.timerEvent = "resumed"</code></li>
        <li>Sending a <code>resume</code> message when the timer is not paused will be ignored and the current status restored</li>
      </ul>
      If the <i>Resume timer on deploy/restart</i> option is enabled and the timer is paused when Node-RED restarts or the flow is redeployed, the timer will restore as paused at the same remaining time.
    </p>
    <p><b>Disable and Enable</b><br>
      The node can be disabled to prevent new timer starts while allowing the current run to complete:
      <ul>
        <li><code>disable</code> (any case) — prevents new timer starts. The current timer run continues if running, including any active heartbeat. The timer can still be stopped, paused, resumed, queried, locked, unlocked, and time adjusted while disabled. A duplicate disable is routed to output 4.</li>
        <li><code>enable</code> (any case) — re-enables new timer starts</li>
      </ul>
      When disabled, the node status shows a grey ring with <code>Disabled | </code> prefixed to the normal status text. The disabled state is persisted to disk if <i>Resume timer on deploy/restart</i> is enabled.
      <br><br>
      <b>Use case:</b> A dehumidifier runs for 6 hours (timer 1). When it expires, send <code>disable</code> to the node and start a 4 hour rest timer (timer 2). Any start messages received during the 4 hour rest are blocked. When the 4 hour rest expires, send <code>enable</code> to allow the next cycle to start.
    </p>
    <p><b>Lock and Unlock</b><br>
      The Do Not Reset Timer behavior can be toggled at runtime without changing the node configuration:
      <ul>
        <li><code>lock</code> (any case) — enables Do Not Reset Timer. Subsequent messages while running are ignored and routed to output 4. The ignored count resets to 0.</li>
        <li><code>unlock</code> (any case) — disables Do Not Reset Timer. Subsequent messages will reset the timer normally. The ignored count resets to 0.</li>
      </ul>
      Both commands work in any timer state and fire the appropriate event on output 5. The lock state is persisted to disk if <i>Resume timer on deploy/restart</i> is enabled.
    </p>
    <p><b>Ignored Message Threshold Action</b><br>
      When <i>Do Not Reset Timer on Subsequent Incoming Message</i> is enabled, you can configure an automatic action to take when the ignored message count reaches a configured threshold:
      <ul>
        <li><b>Do Nothing (default)</b> — no action taken, count increments indefinitely</li>
        <li><b>Stop</b> — stops the timer when the threshold is reached</li>
        <li><b>Pause</b> — pauses the timer when the threshold is reached</li>
        <li><b>Reset Timer</b> — restarts the timer from the original duration</li>
        <li><b>Add Time</b> — adds a configured amount of time to the timer</li>
        <li><b>Emit Warning</b> — sends a warning on output 5 without affecting the timer</li>
      </ul>
      For all actions except Do Nothing and Emit Warning, the ignored count resets to 0 after the action fires. If the timer is paused when Reset Timer or Add Time fires, the remaining time is updated but the timer stays paused until a <code>resume</code> message is received.
      <br><br>
      All threshold actions send a message on output 5 with <code>msg.timerEvent</code> indicating what action was taken.
    </p>
    <p><b>Special Note on Milliseconds</b><br>
      While you can set Milliseconds, I would not rely on the accuracy for anything critical. For the purposes of the node status and output 3, except in the case where Reporting is set to None, the milliseconds are not displayed or provided on the 3rd output as it wouldn't make sense based on the available reporting rates.
    </p>
    <p><b>Resume timer on deploy/restart</b><br>
      This option is <b>DISABLED</b> by default. If you <i>ENABLE</i> it (check the checkbox) then if the stoptimer is running and you re-Deploy the flow, or restart Node-RED, then the timer will automatically restart itself where it should be. What does that mean? A couple of examples will help here.
      <ul>
        <li>If you had a 10 minute stoptimer running, with 6 minutes elapsed (ie: 4 minutes left) and you hit Deploy, normally the stoptimer would no longer be running, but if you have this feature enabled, the timer will continue running from the 6 minute mark (ie: counting down 4 more minutes and then trigger).</li>
        <li>If you had a 10 minute stoptimer running, with 6 minutes elapsed (ie: 4 minutes left) and you <i>stopped</i> Node-RED for 2 minutes and then restarted it, normally the stoptimer would no longer be running, but if you have this feature enabled, the timer will continue running from the 8 minute mark (6 minutes from the original run + 2 minutes of Node-RED downtime) -- counting down 2 more minutes and then trigger.</li>
        <li><b>Special Case</b> If on restart or re-Deploy, there is less than 3 seconds remaining on the stoptimer (or if the stoptimer should have elapsed already) then the stoptimer is set to a random amount between 3 and 8 seconds. This helps to ensure that anything else that needs to initialize before the stoptimer triggers has a chance to do so. It also helps so that if you happen to have a lot of timers, they don't all trigger at once and flood unsuspecting nodes/devices.</li>
      </ul>
      <br>
      This persistence is <b>not</b> related to "Persistent Context" (the contextStorage option in <code>settings.js</code>). When the "Resume timer" option is enabled in the node, the node will store timer related information in a <code>stvd-timers</code> subdirectory of <i>userDir</i> (where <i>userDir</i> is defined in <code>settings.js</code>). If <i>userDir</i> is not explicitly defined, it defaults to a directory called <code>.node-red</code> in your home user directory. The files in this directory will be created/destroyed as needed by the node.
    </p>
    <p><b>What is <code>_timerpass</code></b><br>
      <code>_timerpass</code> is a property added to messages exiting the 1st/top and 2nd/middle outputs of stoptimer.
      <code>_timerpass</code> is set to <code>true</code> when the timer expires.
      <br><br>
      <b>What does <code>_timerpass</code> do?</b><br>
      If stoptimer has at any point been stopped using message.payload=stop (any case) AND <br>
      If stoptimer has not received a message with _timerpass not set since that time THEN <br>
      any incoming message that has the _timerpass=true property will die within stoptimer with no output.
      <br><br>
      <b>How does Stoptimer-Varidelay Plus handle this?</b><br>
      <i>Ignore Timerpass</i> in the node config dialog. If enabled, the node will ignore the presence of the <code>_timerpass</code> property on an incoming message and will process it normally.
    </p>
    <p><b>Do Not Reset Timer on Subsequent Incoming Message</b><br>
      This option is <b>DISABLED</b> by default. If you <i>ENABLE</i> it (check the checkbox) then while the timer is running, any subsequent incoming messages (other than control commands) will be ignored and the timer will continue running undisturbed. The first message always starts the timer normally. This can also be toggled at runtime using the <code>lock</code> and <code>unlock</code> commands.
      <br><br>
      When a message is ignored, it will be sent to the 4th output with the original message content intact plus:
      <ul>
        <li><code>msg.remainingTime</code> — remaining time in milliseconds</li>
        <li><code>msg.timerState</code> — current timer state</li>
        <li><code>msg.ignoredCount</code> — number of messages ignored during this timer run</li>
        <li><code>msg.lastIgnoredTime</code> — ISO 8601 timestamp of this ignored message</li>
      </ul>
      When this option is enabled, the node status will show:<br>
      <code>Remaining: 00:04:32 | Ignored: 3, Last: Jun 27 14:22:05</code>
    </p>
</script>
